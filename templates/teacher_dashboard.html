<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Autograder - Teacher Portal</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; padding: 40px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { color: #333; }
        select, input[type="file"], button { width: 100%; padding: 10px; margin-top: 10px; margin-bottom: 20px; border-radius: 4px; border: 1px solid #ccc; }
        .btn-primary { background-color: #0056b3; color: white; font-weight: bold; cursor: pointer; border: none; }
        .btn-primary:hover { background-color: #004494; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #f8f9fa; }

        /* Status Colors */
        .status-loading { font-weight: bold; color: #f0ad4e; }
        .status-success { font-weight: bold; color: #5cb85c; }
        .status-error { font-weight: bold; color: #d9534f; }
        .flagged { color: #d9534f; font-weight: bold; }
        .all-good { color: #5cb85c; }

        /* The Hidden Expandable Details Section */
        .details-row { display: none; background-color: #fcfcfc; }
        .details-box { padding: 15px 20px; border-left: 4px solid #0056b3; margin: 10px 0; border-radius: 0 4px 4px 0; }
        .details-box h4 { margin-top: 0; color: #333; margin-bottom: 8px; }
        .details-box p { margin-top: 0; color: #555; line-height: 1.5; }
        .details-box ul { margin-top: 5px; padding-left: 20px; color: #444; }
        .details-box li { margin-bottom: 8px; line-height: 1.4; }

        .btn-toggle { background-color: #e9ecef; color: #333; border: 1px solid #ccc; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 14px; }
        .btn-toggle:hover { background-color: #dde2e6; }
    </style>
</head>
<body>

<div class="container">
    <h2>AI Autograder - Batch Grading Portal</h2>

    <label>Select Course:</label>
    <select id="courseSelect">
        <option value="CSC130_Spring2026">CSC 130 (Spring 2026)</option>
        <option value="PHY212_Spring2026">PHY 212 (Physics II)</option>
        <option value="PHY110_Spring2026">PHY 110 (Physics I)</option>
    </select>

    <label>Select Assignment:</label>
    <select id="assignmentSelect">
        <option value="Module_5_Discussion">Module 5 Dynamic Programming</option>
        <option value="Stack_Discussion">Stack Discussion</option>
        <option value="Lab_1_Kinematics">Lab 1: Kinematics (PHY 110)</option>
        <option value="Lab_3_Circuits">Lab 3: Circuits (PHY 212)</option>
    </select>

    <label>Upload Student Submissions (Select multiple PDFs):</label>
    <input type="file" id="fileInput" multiple accept=".pdf">

    <button class="btn-primary" onclick="startBatchGrading()">Grade All Submissions</button>

    <h3>Live Grading Results</h3>
    <table id="resultsTable">
        <thead>
            <tr>
                <th>Student File</th>
                <th>Status</th>
                <th>Score</th>
                <th>AI Flags</th>
                <th>Feedback</th>
            </tr>
        </thead>
        <tbody>
            </tbody>
    </table>
</div>

<script>
    // Helper function to slide open the details row
    function toggleDetails(rowId) {
        const row = document.getElementById(rowId);
        if (row.style.display === "none" || row.style.display === "") {
            row.style.display = "table-row";
        } else {
            row.style.display = "none";
        }
    }

    async function startBatchGrading() {
        const files = document.getElementById('fileInput').files;

        // Grab elements to extract text for the warning pop-up
        const courseDropdown = document.getElementById('courseSelect');
        const assignmentDropdown = document.getElementById('assignmentSelect');

        const course = courseDropdown.value;
        const assignment = assignmentDropdown.value;

        const courseText = courseDropdown.options[courseDropdown.selectedIndex].text;
        const assignmentText = assignmentDropdown.options[assignmentDropdown.selectedIndex].text;

        const tbody = document.querySelector('#resultsTable tbody');

        if (files.length === 0) {
            alert("Please select at least one PDF.");
            return;
        }

        const confirmationMessage = `Wait! Please confirm your selection:\n\nCourse: ${courseText}\nAssignment: ${assignmentText}\n\nDo you want to proceed and run the AI Autograder?`;
        if (!window.confirm(confirmationMessage)) {
            console.log("Grading cancelled by user.");
            return; // Stops the function immediately
        }

        // Loop through files ONE BY ONE
        for (let i = 0; i < files.length; i++) {
            let file = files[i];

            // 1. Create the Main Row
            let mainRow = tbody.insertRow();
            let fileCell = mainRow.insertCell(0);
            let statusCell = mainRow.insertCell(1);
            let scoreCell = mainRow.insertCell(2);
            let flagCell = mainRow.insertCell(3);
            let actionCell = mainRow.insertCell(4);

            fileCell.innerText = file.name;
            statusCell.innerText = "Grading...";
            statusCell.className = "status-loading";

            let formData = new FormData();
            formData.append('submission', file);
            formData.append('course_id', course);
            formData.append('assignment_id', assignment);

            try {
                let response = await fetch('/grade', { method: 'POST', body: formData });
                let result = await response.json();

                // Update Status & Score
                statusCell.innerText = "Complete";
                statusCell.className = "status-success";
                scoreCell.innerHTML = `<strong>${result.score}</strong>`;

                // Handle AI Flags
                if (result.flagged_for_review) {
                    flagCell.innerHTML = `<span class="flagged">⚠️ Needs Review</span><br><small>${result.flag_reason}</small>`;
                } else {
                    flagCell.innerHTML = `<span class="all-good">Clear</span>`;
                }

                // Add Toggle Button
                let detailsId = `details-${Date.now()}-${i}`;
                actionCell.innerHTML = `<button class="btn-toggle" onclick="toggleDetails('${detailsId}')">View Details</button>`;

                // 2. Create the Hidden Details Row
                let detailsRow = tbody.insertRow();
                detailsRow.id = detailsId;
                detailsRow.className = "details-row";
                let detailsCell = detailsRow.insertCell(0);
                detailsCell.colSpan = 5; // Stretch across all columns

                // Build the inner HTML from the JSON breakdown
                let breakdownHTML = `<div class="details-box">`;
                breakdownHTML += `<h4>Overall Summary</h4><p>${result.feedback_summary}</p>`;
                breakdownHTML += `<h4>Detailed Rubric Breakdown</h4><ul>`;

                // Loop through the "detailed_grading" array
                if (result.detailed_grading) {
                    result.detailed_grading.forEach(q => {
                        breakdownHTML += `<li><strong>${q.question} (${q.points}):</strong> ${q.reason}</li>`;
                    });
                }

                breakdownHTML += `</ul></div>`;
                detailsCell.innerHTML = breakdownHTML;

            } catch (error) {
                statusCell.innerText = "Failed";
                statusCell.className = "status-error";
                scoreCell.innerText = "Error";
                flagCell.innerText = "-";
                actionCell.innerText = "-";
            }
        }
    }
</script>

</body>
</html>
